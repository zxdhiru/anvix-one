services:
  postgres:
    image: postgres:17-alpine
    container_name: anvix-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: anvix
      POSTGRES_PASSWORD: anvix_dev_password
      POSTGRES_DB: anvix_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U anvix']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anvix-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: anvix-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MH_STORAGE: memory

volumes:
  postgres_data:
  redis_data:
