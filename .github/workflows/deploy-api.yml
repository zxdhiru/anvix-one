# ============================================================================
# Deploy API — AWS (ECR → App Runner)
# ============================================================================
# Triggered on push to main when API code changes.
# Cost optimized: App Runner auto-scales (including to min instances),
# no load balancer or cluster management needed.
# ============================================================================

name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'packages/utils/**'
      - 'packages/validators/**'
      - 'docker/Dockerfile.api'

  # Allow manual deployment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-api-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: anvix-api
  APP_RUNNER_SERVICE: anvix-api

permissions:
  id-token: write # OIDC for AWS
  contents: read

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------
      # Authenticate to AWS via OIDC (no long-lived credentials)
      # -----------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------
      # Login to ECR
      # -----------------------------------------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------------------------------
      # Build & push Docker image with caching
      # -----------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------
      # Deploy to App Runner
      # -----------------------------------------------------------
      - name: Deploy to App Runner
        id: deploy-apprunner
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ${{ env.APP_RUNNER_SERVICE }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          access-role-arn: ${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          port: '4000'
          cpu: 0.25
          memory: 0.5
          wait-for-service-stability-seconds: 300

      - name: Output App Runner URL
        run: echo "API deployed to ${{ steps.deploy-apprunner.outputs.service-url }}"

  # --------------------------------------------------------------------------
  # Run database migrations after deploy
  # --------------------------------------------------------------------------
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit migrate --config=apps/api/drizzle.config.ts
